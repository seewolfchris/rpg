name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      WORLD_DEFAULT_SLUG: chroniken-der-asche

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_sqlite, sqlite3, dom, fileinfo, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate

      - name: Run static analysis
        run: composer analyse

      - name: Run backend tests
        run: php artisan test --without-tty --do-not-cache-result

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend JS tests
        run: npm run test:js

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: npm run test:e2e

      - name: Build frontend assets
        run: npm run build

      - name: Smoke checks (artisan mode)
        run: SMOKE_MODE=artisan SMOKE_START_SERVER=0 scripts/release_smoke.sh

      - name: Verify generated frontend artifacts are committed
        run: git diff --exit-code -- public/build public/js/character-sheet.global.js
