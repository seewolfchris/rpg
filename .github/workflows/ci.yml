name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      WORLD_DEFAULT_SLUG: chroniken-der-asche

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_sqlite, sqlite3, dom, fileinfo, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate

      - name: Run static analysis
        run: composer analyse

      - name: Run architecture guardrails
        run: php artisan test --without-tty --do-not-cache-result tests/Feature/Architecture/ArchitectureGuardrailsTest.php

      - name: Run backend tests
        run: php artisan test --without-tty --do-not-cache-result --exclude-group=mysql-concurrency

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend JS tests
        run: npm run test:js

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: npm run test:e2e

      - name: Build frontend assets
        run: npm run build

      - name: Smoke checks (artisan mode)
        run: SMOKE_MODE=artisan SMOKE_START_SERVER=0 scripts/release_smoke.sh

      - name: Verify generated frontend artifacts are committed
        run: git diff --exit-code -- public/build public/js/character-sheet.global.js

  mysql-concurrency:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      WORLD_DEFAULT_SLUG: chroniken-der-asche
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: rpg_test
      DB_USERNAME: rpg
      DB_PASSWORD: secret
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rpg_test
          MYSQL_USER: rpg
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, dom, fileinfo, gd
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Run MySQL concurrency tests
        run: php artisan test --without-tty --do-not-cache-result --group=mysql-concurrency
